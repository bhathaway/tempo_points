<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempo Points</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      margin: 0;
      padding: 1rem;
      line-height: 1.5;
    }

    .container {
      max-width: 400px;
      margin: 2rem auto;
      background: #fff;
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
      color: #555;
    }

    .input-group {
      display: flex;
      align-items: stretch;
    }

    .input-group input[type="number"] {
      flex: 1;
      min-width: 0;
      padding: 0.625rem 0.75rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 0;
      appearance: textfield;
      text-align: center;
    }

    .input-group input[type="number"]:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.2);
      z-index: 1;
      position: relative;
    }

    .input-group input[type="number"]::-webkit-inner-spin-button,
    .input-group input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .step-btn {
      width: 3rem;
      flex-shrink: 0;
      font-size: 1.25rem;
      font-weight: 600;
      background: #e8e8e8;
      color: #333;
      border: 1px solid #ccc;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .step-btn:hover {
      background: #ddd;
    }

    .step-btn:active {
      background: #ccc;
    }

    .step-btn.minus {
      border-radius: 6px 0 0 6px;
      border-right: none;
    }

    .step-btn.plus {
      border-radius: 0 6px 6px 0;
      border-left: none;
    }

    .error {
      color: #d32f2f;
      font-size: 0.875rem;
      margin-top: 1rem;
    }

    .results {
      margin-top: 1.5rem;
    }

    .ratio {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 0.75rem;
    }

    .tempo-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .tempo-list li {
      padding: 0.5rem 0.75rem;
      font-size: 1.05rem;
      font-variant-numeric: tabular-nums;
      border-bottom: 1px solid #eee;
    }

    .tempo-list li:last-child {
      border-bottom: none;
    }

    .tempo-list li span.index {
      display: inline-block;
      width: 2rem;
      color: #999;
      text-align: right;
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tempo Points</h1>

    <div class="field">
      <label for="startBpm">Start BPM</label>
      <div class="input-group">
        <button type="button" class="step-btn minus" data-target="startBpm" data-delta="-1">&minus;</button>
        <input type="number" id="startBpm" value="60" min="1">
        <button type="button" class="step-btn plus" data-target="startBpm" data-delta="1">+</button>
      </div>
    </div>

    <div class="field">
      <label for="endBpm">End BPM</label>
      <div class="input-group">
        <button type="button" class="step-btn minus" data-target="endBpm" data-delta="-1">&minus;</button>
        <input type="number" id="endBpm" value="120" min="1">
        <button type="button" class="step-btn plus" data-target="endBpm" data-delta="1">+</button>
      </div>
    </div>

    <div class="field">
      <label for="steps">Intermediate steps</label>
      <div class="input-group">
        <button type="button" class="step-btn minus" data-target="steps" data-delta="-1">&minus;</button>
        <input type="number" id="steps" value="4" min="0">
        <button type="button" class="step-btn plus" data-target="steps" data-delta="1">+</button>
      </div>
    </div>

    <div id="output"></div>
  </div>

  <script>
    function generate() {
      var startBpm = parseInt(document.getElementById('startBpm').value, 10);
      var endBpm = parseInt(document.getElementById('endBpm').value, 10);
      var steps = parseInt(document.getElementById('steps').value, 10);
      var output = document.getElementById('output');

      if (isNaN(startBpm) || isNaN(endBpm) || isNaN(steps)) {
        output.innerHTML = '';
        return;
      }

      if (startBpm < 1 || endBpm < 1) {
        output.innerHTML = '<p class="error">BPM values must be at least 1.</p>';
        return;
      }

      if (steps < 0) {
        output.innerHTML = '<p class="error">Steps must be 0 or greater.</p>';
        return;
      }

      if (startBpm >= endBpm) {
        output.innerHTML = '<p class="error">Start BPM must be less than End BPM.</p>';
        return;
      }

      var n = steps + 1;
      var ratio = Math.pow(endBpm / startBpm, 1 / n);
      var ratioPercent = ((ratio - 1) * 100).toFixed(1);

      var tempos = [];
      for (var i = 0; i <= n; i++) {
        tempos.push(Math.round(startBpm * Math.pow(ratio, i)));
      }

      var html = '<div class="results">';
      html += '<p class="ratio">Avg ratio: ~' + ratioPercent + '% per step</p>';
      html += '<ol class="tempo-list">';
      for (var i = 0; i < tempos.length; i++) {
        html += '<li><span class="index">' + (i + 1) + '.</span>' + tempos[i] + ' bpm</li>';
      }
      html += '</ol>';
      html += '</div>';

      output.innerHTML = html;
    }

    // Live update on any input change
    document.querySelectorAll('input[type="number"]').forEach(function(input) {
      input.addEventListener('input', generate);
    });

    // +/- button handling
    document.querySelectorAll('.step-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var input = document.getElementById(btn.dataset.target);
        var delta = parseInt(btn.dataset.delta, 10);
        var min = parseInt(input.min, 10);
        var newVal = (parseInt(input.value, 10) || 0) + delta;
        if (!isNaN(min) && newVal < min) newVal = min;
        input.value = newVal;
        generate();
      });
    });

    // Generate on page load with defaults
    generate();
  </script>
</body>
</html>
