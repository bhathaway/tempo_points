<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempo Points</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      margin: 0;
      padding: 1rem;
      line-height: 1.5;
    }

    .container {
      max-width: 400px;
      margin: 2rem auto;
      background: #fff;
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
      color: #555;
    }

    input[type="number"] {
      width: 100%;
      padding: 0.625rem 0.75rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      appearance: textfield;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.2);
    }

    button {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    button:hover {
      background: #3a7bc8;
    }

    button:active {
      background: #2e6ab0;
    }

    .error {
      color: #d32f2f;
      font-size: 0.875rem;
      margin-top: 1rem;
    }

    .results {
      margin-top: 1.5rem;
    }

    .ratio {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 0.75rem;
    }

    .tempo-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .tempo-list li {
      padding: 0.5rem 0.75rem;
      font-size: 1.05rem;
      font-variant-numeric: tabular-nums;
      border-bottom: 1px solid #eee;
    }

    .tempo-list li:last-child {
      border-bottom: none;
    }

    .tempo-list li span.index {
      display: inline-block;
      width: 2rem;
      color: #999;
      text-align: right;
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tempo Points</h1>

    <div class="field">
      <label for="startBpm">Start BPM</label>
      <input type="number" id="startBpm" value="60" min="1">
    </div>

    <div class="field">
      <label for="endBpm">End BPM</label>
      <input type="number" id="endBpm" value="120" min="1">
    </div>

    <div class="field">
      <label for="steps">Intermediate steps</label>
      <input type="number" id="steps" value="4" min="0">
    </div>

    <button id="generate">Generate</button>

    <div id="output"></div>
  </div>

  <script>
    function generate() {
      const startBpm = parseInt(document.getElementById('startBpm').value, 10);
      const endBpm = parseInt(document.getElementById('endBpm').value, 10);
      const steps = parseInt(document.getElementById('steps').value, 10);
      const output = document.getElementById('output');

      if (isNaN(startBpm) || isNaN(endBpm) || isNaN(steps)) {
        output.innerHTML = '<p class="error">Please fill in all fields with valid numbers.</p>';
        return;
      }

      if (startBpm < 1 || endBpm < 1) {
        output.innerHTML = '<p class="error">BPM values must be at least 1.</p>';
        return;
      }

      if (steps < 0) {
        output.innerHTML = '<p class="error">Steps must be 0 or greater.</p>';
        return;
      }

      if (startBpm >= endBpm) {
        output.innerHTML = '<p class="error">Start BPM must be less than End BPM.</p>';
        return;
      }

      const n = steps + 1;
      const ratio = Math.pow(endBpm / startBpm, 1 / n);
      const ratioPercent = ((ratio - 1) * 100).toFixed(1);

      const tempos = [];
      for (let i = 0; i <= n; i++) {
        tempos.push(Math.round(startBpm * Math.pow(ratio, i)));
      }

      let html = '<div class="results">';
      html += '<p class="ratio">Avg ratio: ~' + ratioPercent + '% per step</p>';
      html += '<ol class="tempo-list">';
      for (let i = 0; i < tempos.length; i++) {
        html += '<li><span class="index">' + (i + 1) + '.</span>' + tempos[i] + ' bpm</li>';
      }
      html += '</ol>';
      html += '</div>';

      output.innerHTML = html;
    }

    document.getElementById('generate').addEventListener('click', generate);

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        generate();
      }
    });
  </script>
</body>
</html>
